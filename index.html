<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>carton</title>
  <style>
    :root {
      --paper: #f1e2c6;
      --paper-deep: #d7b98a;
      --ink: #342515;
      --tape: #f6c34a;
      --shadow: rgba(67, 41, 10, 0.18);
      --line: rgba(52, 37, 21, 0.18);
      --bg-top: #fcf6ea;
      --bg-bottom: #ead7b4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.75), transparent 32%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    .page {
      width: min(1100px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 48px 0 64px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 56px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.55), rgba(255,255,255,0.08)),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.04) 0,
          rgba(255,255,255,0.04) 16px,
          rgba(0,0,0,0.02) 16px,
          rgba(0,0,0,0.02) 17px
        ),
        var(--paper);
      box-shadow: 0 22px 60px var(--shadow);
    }

    .tape {
      position: absolute;
      top: 18px;
      right: -32px;
      padding: 10px 54px;
      transform: rotate(8deg);
      background: rgba(246, 195, 74, 0.72);
      border: 1px solid rgba(120, 90, 20, 0.18);
      font-size: 13px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(52px, 10vw, 110px);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 18px 0 0;
      max-width: 660px;
      font-size: clamp(18px, 2.2vw, 24px);
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px;
      background: rgba(255, 252, 244, 0.72);
      backdrop-filter: blur(4px);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: 0.02em;
    }

    .card p {
      margin: 0;
      line-height: 1.75;
      font-size: 15px;
    }

    .box-diagram {
      position: relative;
      height: 280px;
      margin-top: 28px;
      border-radius: 24px;
      border: 1px dashed rgba(52, 37, 21, 0.28);
      background: rgba(255,255,255,0.22);
      overflow: hidden;
    }

    .flap,
    .body,
    .label {
      position: absolute;
      border: 1px solid rgba(52, 37, 21, 0.16);
      background: linear-gradient(180deg, #edd8b0, #ddbc86);
      box-shadow: 0 14px 28px rgba(70, 45, 16, 0.14);
    }

    .body {
      left: 50%;
      bottom: 34px;
      width: min(440px, calc(100% - 48px));
      height: 150px;
      transform: translateX(-50%);
      border-radius: 14px;
    }

    .flap.left {
      left: calc(50% - 220px);
      bottom: 152px;
      width: 160px;
      height: 54px;
      transform: skewX(-26deg) rotate(-7deg);
      transform-origin: bottom right;
    }

    .flap.right {
      right: calc(50% - 220px);
      bottom: 152px;
      width: 160px;
      height: 54px;
      transform: skewX(26deg) rotate(7deg);
      transform-origin: bottom left;
    }

    .flap.top {
      left: 50%;
      bottom: 176px;
      width: 190px;
      height: 42px;
      transform: translateX(-50%) perspective(400px) rotateX(63deg);
    }

    .label {
      left: 50%;
      bottom: 86px;
      width: 180px;
      height: 58px;
      transform: translateX(-50%);
      border-radius: 10px;
      background: linear-gradient(180deg, #fff8eb, #f0dfbc);
      display: grid;
      place-items: center;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    @media (max-width: 820px) {
      .hero {
        padding: 28px;
        border-radius: 22px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .box-diagram {
        height: 220px;
      }

      .body {
        width: calc(100% - 28px);
        height: 118px;
      }

      .flap.left {
        left: 14px;
        width: 100px;
      }

      .flap.right {
        right: 14px;
        width: 100px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="tape">packed lightly</div>
      <h1>carton</h1>
      <p class="subtitle">
        carton 将纸箱定义为一种快速打包和组装技术。
        它的重点不是复杂结构，而是在最短路径内完成收拢、成型、搬运和交付。
      </p>

      <div class="grid">
        <article class="card">
          <h2>What Is A Carton</h2>
          <p>纸箱是一套轻量级打包系统，用来把零散内容快速整理成稳定、可搬运的整体。</p>
        </article>
        <article class="card">
          <h2>Why It Matters</h2>
          <p>好的纸箱结构可以降低打包成本，缩短组装时间，并提升运输、堆叠和存放效率。</p>
        </article>
        <article class="card">
          <h2>Core Philosophy</h2>
          <p>快速、轻量、易组装、可封装、可展开，用简单结构完成高频封装任务。</p>
        </article>
      </div>

      <div class="box-diagram" aria-hidden="true">
        <div class="flap left"></div>
        <div class="flap right"></div>
        <div class="flap top"></div>
        <div class="body"></div>
        <div class="label">carton project</div>
      </div>
    </section>
  </main>
</body>
</html>
